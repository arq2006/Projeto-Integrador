<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #fbf7ff; }
      .ink { fill: #27104f; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #64748b; font-family: Arial, Helvetica, sans-serif; }
      .purple { fill: #6d28d9; }
      .soft { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 3; }
      .panel { fill: #ffffff; stroke: #8b5cf6; stroke-width: 4; rx: 24; }
      .wire { fill: none; stroke: #6d28d9; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #38bdf8; stroke-width: 4; stroke-dasharray: 12 10; stroke-linecap: round; }
      .label { fill: #581c87; font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; }
      .small { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 22px; }
      .tiny { fill: #64748b; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .title { fill: #3b0764; font-family: Arial, Helvetica, sans-serif; font-size: 54px; font-weight: 800; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="70" y="85">Canvas / Esboço do Site - Velaris PetCare</text>
  <text class="muted" x="72" y="123" font-size="24">Protótipo pensado antes do código: poucas telas, fluxo simples e foco no tema comunitário.</text>

  <rect class="panel" x="70" y="170" width="430" height="285"/>
  <text class="label" x="100" y="220">1. Home</text>
  <rect class="soft" x="100" y="250" width="150" height="34" rx="17"/>
  <text class="tiny" x="116" y="274">Velaris PetCare</text>
  <line class="wire" x1="100" y1="315" x2="440" y2="315"/>
  <line class="wire" x1="100" y1="345" x2="390" y2="345"/>
  <rect class="soft" x="100" y="378" width="175" height="44" rx="18"/>
  <text class="small" x="118" y="407">Buscar serviços</text>
  <circle class="dash" cx="405" cy="300" r="58"/>
  <text class="tiny" x="330" y="390">Apresenta problema,</text>
  <text class="tiny" x="330" y="416">slogan e objetivo.</text>

  <rect class="panel" x="585" y="170" width="430" height="285"/>
  <text class="label" x="615" y="220">2. Busca simples</text>
  <rect class="soft" x="615" y="252" width="350" height="45" rx="18"/>
  <text class="tiny" x="635" y="282">Nome, bairro ou palavra-chave</text>
  <rect class="soft" x="615" y="318" width="160" height="42" rx="16"/>
  <text class="tiny" x="640" y="346">Bairro</text>
  <rect class="soft" x="800" y="318" width="165" height="42" rx="16"/>
  <text class="tiny" x="825" y="346">Categoria</text>
  <line class="dash" x1="625" y1="397" x2="965" y2="397"/>
  <text class="tiny" x="650" y="430">Sem lógica complexa: filter + map.</text>

  <rect class="panel" x="1100" y="170" width="430" height="285"/>
  <text class="label" x="1130" y="220">3. Cards</text>
  <rect class="soft" x="1130" y="252" width="120" height="130" rx="18"/>
  <rect class="soft" x="1270" y="252" width="120" height="130" rx="18"/>
  <rect class="soft" x="1410" y="252" width="90" height="130" rx="18"/>
  <line class="wire" x1="1148" y1="402" x2="1488" y2="402"/>
  <text class="tiny" x="1135" y="432">Nome, categoria, bairro, avaliação e horário.</text>

  <path class="wire" d="M500 312 C530 312, 550 312, 585 312"/>
  <path class="wire" d="M1015 312 C1045 312, 1070 312, 1100 312"/>

  <rect class="panel" x="190" y="540" width="430" height="270"/>
  <text class="label" x="220" y="590">4. Detalhes</text>
  <line class="wire" x1="220" y1="626" x2="560" y2="626"/>
  <line class="wire" x1="220" y1="656" x2="510" y2="656"/>
  <rect class="soft" x="220" y="688" width="145" height="36" rx="16"/>
  <text class="tiny" x="240" y="713">Contato</text>
  <rect class="soft" x="385" y="688" width="145" height="36" rx="16"/>
  <text class="tiny" x="405" y="713">Horário</text>
  <rect class="soft" x="220" y="742" width="190" height="45" rx="18"/>
  <text class="small" x="242" y="772">Agendar</text>

  <rect class="panel" x="705" y="540" width="300" height="270"/>
  <text class="label" x="735" y="590">5. Sugestão</text>
  <rect class="soft" x="735" y="622" width="235" height="36" rx="14"/>
  <rect class="soft" x="735" y="672" width="235" height="36" rx="14"/>
  <rect class="soft" x="735" y="722" width="235" height="36" rx="14"/>
  <text class="tiny" x="742" y="790">Formulário + sucesso fake.</text>

  <rect class="panel" x="1090" y="540" width="320" height="270"/>
  <text class="label" x="1120" y="590">6. Admin</text>
  <rect class="soft" x="1120" y="622" width="80" height="70" rx="14"/>
  <rect class="soft" x="1220" y="622" width="80" height="70" rx="14"/>
  <rect class="soft" x="1320" y="622" width="60" height="70" rx="14"/>
  <line class="wire" x1="1120" y1="725" x2="1380" y2="725"/>
  <line class="wire" x1="1120" y1="755" x2="1340" y2="755"/>
  <text class="tiny" x="1120" y="790">Apenas painel conceitual.</text>

  <path class="wire" d="M410 455 C410 500, 410 510, 410 540"/>
  <path class="wire" d="M620 675 C650 675, 675 675, 705 675"/>
  <path class="wire" d="M1005 675 C1040 675, 1060 675, 1090 675"/>

  <rect x="70" y="835" width="1460" height="1" fill="#c4b5fd"/>
  <text class="small" x="70" y="870">Ideia para apresentar: primeiro veio este fluxo simples; depois ele virou as rotas Home, Serviços, Detalhes, Sugestão e Admin.</text>
</svg>
